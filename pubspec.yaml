name: arculus
description: "Free, open-source, multiplatform 2FA authenticator."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State
  provider: ^6.1.2

  # Utils
  intl: any

  # Data
  drift: ^2.34.1
  drift_flutter: ^0.3.1-wip
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5

  # UI
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.8
  flutter_riverpod: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  drift_dev: ^2.34.2+1
  build_runner: ^2.15.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
